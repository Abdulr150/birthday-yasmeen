<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Happy Birthday Yasmeen | Enchanted Garden</title>
    <style>
        /* ===== BASE STYLES & RESET (preserved & enhanced) ===== */
        *,
        *::after,
        *::before {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-color: #000;
            --gold-glow: #ffdf8c;
            --birthday-pink: #ffb7c5;
            --birthday-gold: #ffdd77;
            --soft-shadow: 0 20px 35px rgba(0,0,0,0.4), 0 0 25px rgba(0,255,255,0.3);
        }

        body {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--dark-color);
            overflow-x: hidden;
            overflow-y: auto;
            perspective: 1000px;
            font-family: 'Segoe UI', 'Dancing Script', 'Pacifico', 'Cursive', 'Poppins', system-ui, -apple-system, 'Brush Script MT', cursive;
            position: relative;
        }

        /* magical night background (original) */
        .night {
            position: fixed;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            filter: blur(0.1vmin);
            background-image: radial-gradient(ellipse at top, transparent 0%, var(--dark-color)), radial-gradient(ellipse at bottom, var(--dark-color), rgba(145, 233, 255, 0.2)), repeating-linear-gradient(220deg, black 0px, black 19px, transparent 19px, transparent 22px), repeating-linear-gradient(189deg, black 0px, black 19px, transparent 19px, transparent 22px), repeating-linear-gradient(148deg, black 0px, black 19px, transparent 19px, transparent 22px), linear-gradient(90deg, #00fffa, #f0f0f0);
            z-index: 0;
            pointer-events: none;
        }

        /* flowers container */
        .flowers {
            position: relative;
            transform: scale(0.7);
            z-index: 5;
            margin-bottom: 5vh;
        }

        /* ===== BIRTHDAY TEXT ART - enchanted glowing calligraphy ===== */
        .birthday-wish {
            position: fixed;
            top: 12vh;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 200;
            pointer-events: none;
            animation: floatGlow 3s ease-in-out infinite, textFadeIn 1.8s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
            filter: drop-shadow(0 0 12px rgba(255,200,100,0.8));
        }

        .main-message {
            font-family: 'Dancing Script', 'Pacifico', 'Brush Script MT', cursive;
            font-size: clamp(2.2rem, 10vw, 5.8rem);
            font-weight: 700;
            background: linear-gradient(135deg, #FFF5C4, #FFD966, #FFB347, #FF85A1);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 0.04em;
            text-shadow: 0 2px 15px rgba(255,215,0,0.5), 0 0 30px rgba(255,140,200,0.4);
            animation: gradientShift 5s ease infinite, gentleScale 2.4s infinite alternate;
            display: inline-block;
            padding: 0.2em 0.5em;
            backdrop-filter: blur(3px);
            border-radius: 80px;
            white-space: nowrap;
        }

        @media (max-width: 680px) {
            .main-message {
                white-space: normal;
                font-size: clamp(1.8rem, 8vw, 3.8rem);
                padding: 0.2em 0.8em;
                background-size: 250% 250%;
            }
            .birthday-wish {
                top: 8vh;
            }
            .flowers {
                transform: scale(0.6);
                margin-bottom: 2vh;
            }
        }

        /* elegant subtle underline / decorative swirl */
        .wish-decoration {
            display: block;
            font-size: 1.2rem;
            letter-spacing: 8px;
            margin-top: 12px;
            font-family: 'Segoe UI', 'Dancing Script', cursive;
            background: linear-gradient(120deg, #ffdfa5, #ffb3ba, #c0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 400;
            text-shadow: 0 0 8px rgba(255,220,150,0.7);
            opacity: 0.9;
            animation: twinkle 2.2s infinite;
        }

        /* sparkling particles around text */
        .sparkle-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 199;
            overflow: hidden;
        }

        .sparkle {
            position: absolute;
            background: radial-gradient(circle, #fff9c4, #ffdd99);
            border-radius: 50%;
            opacity: 0;
            width: 6px;
            height: 6px;
            animation: floatSparkle 6s infinite ease-in-out;
            filter: blur(1px);
            box-shadow: 0 0 6px gold;
        }

        /* animations */
        @keyframes floatGlow {
            0% { transform: translateY(0px) scale(1); text-shadow: 0 0 5px #ffbf69; }
            50% { transform: translateY(-8px) scale(1.02); text-shadow: 0 0 25px #ffa07a, 0 0 10px #ffe5b4; }
            100% { transform: translateY(0px) scale(1); text-shadow: 0 0 5px #ffbf69; }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes gentleScale {
            0% { transform: scale(1); letter-spacing: 0.04em; }
            100% { transform: scale(1.01); letter-spacing: 0.06em; }
        }

        @keyframes twinkle {
            0% { opacity: 0.5; text-shadow: 0 0 2px #fff0b5; }
            100% { opacity: 1; text-shadow: 0 0 15px #ffcf9a; }
        }

        @keyframes floatSparkle {
            0% { transform: translateY(0vh) translateX(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-30vh) translateX(40px) rotate(200deg); opacity: 0; }
        }

        @keyframes textFadeIn {
            0% { opacity: 0; transform: translateY(40px) scale(0.92); filter: blur(12px); }
            40% { opacity: 0.7; }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* extra elegant ribbon or subtle heart at bottom */
        .birthday-footer {
            position: fixed;
            bottom: 15px;
            right: 20px;
            z-index: 210;
            font-family: monospace;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 60px;
            color: #ffddbb;
            letter-spacing: 1px;
            pointer-events: none;
            border-left: 2px solid #ffcc88;
            font-weight: 300;
        }

        /* make sure the flowers and grass stay interactive but text floats above */
        .flowers, .night {
            pointer-events: auto;
        }

        /* preserve all original flower animations and elements (no style loss) */
        /* The entire original CSS is kept, only appended. All classes remain untouched. */
    </style>

    <script>
        // Enhance with floating sparkles and subtle confetti effect (celebratory)
        (function createSparkles() {
            const container = document.getElementById('sparkleContainer');
            if(!container) return;
            const sparkleCount = 45;
            for(let i = 0; i < sparkleCount; i++) {
                const spark = document.createElement('div');
                spark.classList.add('sparkle');
                const size = Math.random() * 8 + 3;
                spark.style.width = size + 'px';
                spark.style.height = size + 'px';
                spark.style.left = Math.random() * 100 + '%';
                spark.style.top = Math.random() * 90 + '%';
                const duration = Math.random() * 7 + 4;
                spark.style.animationDuration = duration + 's';
                spark.style.animationDelay = Math.random() * 8 + 's';
                spark.style.opacity = Math.random() * 0.6 + 0.2;
                spark.style.filter = `blur(${Math.random() * 1.5}px)`;
                container.appendChild(spark);
            }
        })();

        // optional: generate floating heart particles on click or gentle birthday mood
        // Also ensure that the not-loaded class removal triggers text reveal perfectly.
        window.addEventListener('load', () => {
            // original loader removes 'not-loaded' after 1000ms
            // but we also ensure that if JS runs perfectly, text is visible.
            const existingScript = document.querySelector('script[src="java.js"]');
            if(existingScript) {
                // original behavior already removes class, we don't interfere.
            }
            // extra micro celebration: tiny floating hearts on load
            const bodyEl = document.body;
            for(let i = 0; i < 16; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.innerHTML = '🌸';
                    heart.style.position = 'fixed';
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.bottom = '-20px';
                    heart.style.fontSize = (Math.random() * 20 + 16) + 'px';
                    heart.style.opacity = '0.7';
                    heart.style.pointerEvents = 'none';
                    heart.style.zIndex = '999';
                    heart.style.transition = 'all 5s ease-out';
                    heart.style.filter = 'drop-shadow(0 0 3px gold)';
                    document.body.appendChild(heart);
                    setTimeout(() => {
                        heart.style.transform = `translateY(-${Math.random() * 70 + 30}vh) rotate(${Math.random() * 60 - 30}deg)`;
                        heart.style.opacity = '0';
                    }, 50);
                    setTimeout(() => heart.remove(), 5500);
                }, i * 180);
            }
        });

        // enhance original: ensure that after not-loaded class removal, the text stays smooth
        // preserving all flower keyframes and original animations.
        const originalOnload = window.onload;
        window.onload = (e) => {
            if(originalOnload) originalOnload(e);
            // additional fade magic for extra charm
            const wishDiv = document.querySelector('.birthday-wish');
            if(wishDiv) wishDiv.style.animationPlayState = 'running';
        };
    </script>
